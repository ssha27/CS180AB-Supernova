services:
  supernova:
    build: .
    ports:
      - "8000:8000"
    shm_size: '2g'
    environment:
      - SUPERNOVA_STATIC_DIR=/app/frontend/dist
      - SUPERNOVA_OUTPUT_DIR=/data/supernova
    volumes:
      - supernova-data:/data/supernova
    deploy:
      resources:
        limits:
          memory: 16g

volumes:
  supernova-data:
